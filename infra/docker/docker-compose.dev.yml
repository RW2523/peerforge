version: '3.8'
# PeerForge — Minimal local dev stack
# Runs Postgres, Redis, MinIO only.
# The FastAPI backend and Next.js frontend run outside Docker to avoid port conflicts
# with the full Supabase stack (Kong on 8000, Studio on 3000).

services:
  db:
    image: postgres:15-alpine
    container_name: peerforge-db
    restart: unless-stopped
    ports:
      - "5433:5432"   # Use 5433 externally to avoid conflicts with existing Postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: peerforge_local
    volumes:
      - peerforge-db-data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: peerforge-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - peerforge-redis-data:/data

  minio:
    image: minio/minio:latest
    container_name: peerforge-minio
    restart: unless-stopped
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # MinIO console
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - peerforge-minio-data:/data

volumes:
  peerforge-db-data:
    driver: local
  peerforge-redis-data:
    driver: local
  peerforge-minio-data:
    driver: local

networks:
  default:
    name: peerforge-dev-network
